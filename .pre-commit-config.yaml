repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-json

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies:
          - textual>=0.70
          - platformdirs>=4.0
          - cryptography>=41.0

  # Full test suite + linters before push (commit hooks do not run pytest).
  # Install with: pre-commit install && pre-commit install --hook-type pre-push
  # Requires dev deps in the same Python as `python` on PATH when git runs hooks
  # (use an activated .venv, or run manually: python scripts/pre_push_check.py).
  - repo: local
    hooks:
      - id: pre-push-check
        name: pre-push (pytest + black + ruff + mypy)
        entry: python scripts/pre_push_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
